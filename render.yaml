services:
  - type: web
    name: outreach-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: LUSHA_API_KEY
        sync: false
      - key: INSTANTLY_API_KEY
        sync: false
      - key: INSTANTLY_WEBHOOK_SECRET
        sync: false
      - key: INSTANTLY_SENDING_ACCOUNTS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_FROM_NAME
        sync: false
